  <script>
  let currentUser = null;
  let currentRole = null;
 const API_BASE = "https://haywo-server.onrender.com";

  async function checkLogin() {
    const id = document.getElementById("emp-input").value.trim().toUpperCase();
    const password = document.getElementById("pwd-input").value;

    try {
      const res = await fetch(`${API_BASE}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, password })
      });

      const data = await res.json();

      if (!data.success) {
        alert(data.msg);
        return;
      }

      currentUser = id;
      currentRole = data.role;

      if (data.mustChange) {
        showChangePassword();
      } else {
        showMenu();
      }
    } catch (err) {
      alert("❌ 無法連線到後端，請確認 server.js 還在執行");
      console.error(err);
    }
  }

  function showChangePassword() {
    document.getElementById("login-screen").innerHTML = `
      <img src="logo.png" class="logo" alt="海沃控股集團" style="margin-bottom: 20px;">
      <h2 style="color:#ffd54f; margin-bottom:20px;">首次登入請設定新密碼</h2>
      <div style="color:#f7f0dc; margin-bottom:20px; opacity:0.9;">請輸入兩次相同的新密碼</div>
      <input id="new1" class="change-input" type="password" placeholder="輸入新密碼">
      <input id="new2" class="change-input" type="password" placeholder="再次輸入新密碼">
      <button class="gold-btn" onclick="changePassword()">確認修改</button>
    `;
  }

  async function changePassword() {
    const p1 = document.getElementById("new1").value;
    const p2 = document.getElementById("new2").value;

    if (!p1 || !p2) {
      alert("請輸入新密碼");
      return;
    }

    if (p1 !== p2) {
      alert("兩次密碼不一致");
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/change-password`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          id: currentUser,
          newPassword: p1
        })
      });

      const data = await res.json();

      if (!data.success) {
        alert(data.msg || "修改失敗");
        return;
      }

      alert("密碼修改成功");
      showMenu();
    } catch (err) {
      alert("❌ 修改失敗，請確認後端還在執行");
      console.error(err);
    }
  }

  function showMenu() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-menu").style.display = "block";

    document.getElementById("welcome-name").textContent = "帳號：" + currentUser;
    document.getElementById("welcome-role").textContent =
      "權限：" + (currentRole === "admin" ? "最高權限" : "一般權限");

    applyRole();
  }

  function applyRole() {
    const items = document.querySelectorAll(".menu-item");
    items.forEach(item => {
      const roles = item.dataset.roles.split(",").map(r => r.trim());
      item.style.display = roles.includes(currentRole) ? "flex" : "none";
    });
  }

  function logout() {
    location.reload();
  }
</script>
